<!doctype html>
<html lang="ar" dir="rtl" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }}</title>
    <link href="/static/vendor/bootstrap/css/bootstrap.rtl.min.css" rel="stylesheet" />
    <link href="/static/vendor/fontawesome/css/all.min.css" rel="stylesheet" />
    <link rel="preload" href="/static/vendor/fontawesome/webfonts/fa-solid-900.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/static/fonts/sf-arabic/SFArabic.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/static/fonts/sf-arabic/SFArabicRounded.woff2" as="font" type="font/woff2" crossorigin>
    <style>
      @font-face {
        font-family: "SF Arabic";
        src:
          url('/static/fonts/sf-arabic/SFArabic.woff2') format('woff2'),
          url('/static/fonts/sf-arabic/SFArabic.ttf') format('truetype');
        font-display: optional;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "SF Arabic", "Segoe UI", Tahoma, sans-serif;
        background: radial-gradient(900px 300px at 100% -10%, rgba(39,93,246,.08), transparent 65%), #f3f6fc;
        color: #1f2a44;
      }
      .card-box {
        width: min(560px, 92vw);
        text-align: center;
        background: #fff;
        border: 1px solid #dbe3ef;
        border-radius: 18px;
        box-shadow: 0 16px 34px rgba(16, 24, 40, .08);
        padding: 28px 22px;
      }
      .icon {
        width: 58px;
        height: 58px;
        margin: 0 auto 10px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        background: #fff1f2;
        color: #dc2626;
        font-size: 1.4rem;
      }
      .title { font-size: 1.24rem; font-weight: 700; margin: 0 0 8px; }
      .sub { color: #64748b; margin: 0; }
      .hint { color: #94a3b8; margin: 10px 0 0; font-size: .9rem; }
    </style>
  </head>
  <body>
    <section class="card-box">
      <div class="icon"><i class="fa-solid fa-ban"></i></div>
      <h1 class="title">الموقع غير متاح حاليًا</h1>
      <p class="sub">يرجى المحاولة مرة أخرى لاحقًا.</p>
      <p class="hint" id="blockedHint"></p>
    </section>
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const visitorUid = params.get("visitor_uid") || "";
        const rawNextUrl = params.get("next") || "/";
        function frontendNextUrl() {
          if (rawNextUrl === "/" && document.referrer) {
            try {
              return new URL("/", document.referrer).href;
            } catch (_) {}
          }
          return rawNextUrl;
        }
        const nextUrl = frontendNextUrl();

        if (!visitorUid) return;

        async function checkStatus() {
          try {
            const res = await fetch("/api/visitor/status", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ visitor_uid: visitorUid, next_url: nextUrl }),
              credentials: "include",
              cache: "no-store",
            });
            if (!res.ok) return;
            const data = await res.json().catch(() => ({}));
            if (data && data.blocked === false) {
              window.location.href = data.redirect_url || nextUrl;
            }
          } catch (_) {}
        }

        checkStatus();
        setInterval(checkStatus, 3000);
      })();
    </script>
  </body>
</html>
